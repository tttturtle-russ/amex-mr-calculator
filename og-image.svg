<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <radialGradient id="g1" cx="10%" cy="24%" r="60%">
      <stop offset="0%" stop-color="#7fcabb" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#7fcabb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="100%" cy="24%" r="60%">
      <stop offset="0%" stop-color="#e8987a" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#e8987a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7fcabb"/>
      <stop offset="40%" stop-color="#e8987a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e8987a" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="1200" fill="#0e1018"/>
  <rect width="1200" height="1200" fill="url(#grid)"/>
  <rect width="1200" height="1200" fill="url(#g1)"/>
  <rect width="1200" height="1200" fill="url(#g2)"/>

  <!-- 内容居中放在中间 630 高度带（y 285..915），导出时居中裁切到 1200x630 -->
  <g transform="translate(0,285)">
    <text x="80" y="150" font-family="'Space Mono','Menlo',monospace" font-size="22" letter-spacing="7"
          fill="#7fcabb">MEMBERSHIP REWARDS · 跨区里程终端</text>

    <text x="78" y="268" font-family="'Songti SC','Fraunces','Georgia',serif" font-size="86" font-weight="600"
          fill="#f4f1e9">Amex MR <tspan fill="#7fcabb">里程换算计算器</tspan></text>

    <text x="80" y="342" font-family="'PingFang SC','Hiragino Sans GB',sans-serif" font-size="33"
          fill="#b3b8c6">GT 前后 · 各区可兑里程对比 · 实时汇率折算</text>

    <g font-family="'Space Mono','Menlo',monospace" font-size="44" font-weight="700">
      <rect x="80" y="428" width="90" height="62" rx="10" fill="#7fcabb" fill-opacity="0.08" stroke="#2a3145"/>
      <text x="125" y="469" text-anchor="middle" fill="#7fcabb">HK</text>
      <text x="198" y="469" fill="#5d8c83">→</text>
      <rect x="246" y="428" width="90" height="62" rx="10" fill="#7fcabb" fill-opacity="0.08" stroke="#2a3145"/>
      <text x="291" y="469" text-anchor="middle" fill="#7fcabb">US</text>
      <text x="364" y="469" fill="#5d8c83">→</text>
      <rect x="412" y="428" width="90" height="62" rx="10" fill="#e8987a" fill-opacity="0.14" stroke="#a96b54"/>
      <text x="457" y="469" text-anchor="middle" fill="#f4b89c">TW</text>
    </g>

    <text x="1120" y="495" text-anchor="end" font-family="'Space Mono','Menlo',monospace" font-size="112" font-weight="700"
          fill="#a4e6d6">80,000<tspan font-size="40" fill="#767e92" font-weight="400"> 里程</tspan></text>

    <rect x="80" y="556" width="1040" height="3" fill="url(#rule)"/>
    <text x="80" y="596" font-family="'Space Mono','Menlo',monospace" font-size="20" letter-spacing="2"
          fill="#767e92">tttturtle-russ.github.io/amex-mr-calculator</text>
  </g>
</svg>
